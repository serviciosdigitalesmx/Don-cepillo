<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Don Cepillo · Productos de Limpieza al Mayoreo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-red: #1d4ed8; /* azul tarjeta */
            --primary-gold: #facc15; /* amarillo tarjeta */
            --dark-bg: #0b1533;
            --light-bg: #f4f8ff;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--dark-bg); color: #2c2418; scroll-behavior: smooth; }
        .bg-pattern { background-image: radial-gradient(rgba(29,78,216,0.12) 1.5px, transparent 1.5px); background-size: 28px 28px; }
        .hero-bg {
            background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.6) 100%), 
                        url('https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&q=80&w=1500');
            background-size: cover; background-position: center;
        }
        .modal-overlay { 
            display: none; position: fixed; inset: 0; z-index: 9999; 
            background: rgba(31, 26, 21, 0.98); backdrop-filter: blur(12px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .filter-btn { transition: all 0.2s ease; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .filter-btn.active { background: var(--primary-red) !important; color: white !important; border-color: var(--primary-red) !important; box-shadow: 0 4px 12px rgba(29,78,216,0.4);}
        
        .menu-item-card { transition: all 0.2s; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .menu-item-card:hover { border-color: var(--primary-gold); transform: translateY(-2px); background: rgba(255,255,255,0.06); }
        
        .toast {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1f2937; color: white; padding: 12px 24px; border-radius: 40px;
            font-weight: 500; z-index: 99999; opacity: 0; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--primary-red); border-radius: 10px; }
        
        .floating-cart { position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 9000; display: none; transform: translateY(100px); transition: 0.3s; }
        .floating-cart.active { display: block; transform: translateY(0); }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased bg-pattern">

    <div id="toast" class="toast"><i class="fas fa-broom text-emerald-400"></i><span id="toastMessage">Agregado al pedido</span></div>

    <!-- Carrito flotante móvil -->
    <div id="floatingCart" class="floating-cart md:hidden">
        <button onclick="openCartModal()" class="w-full bg-gradient-to-r from-blue-700 to-blue-800 text-white py-4 rounded-2xl shadow-xl font-bold flex justify-between px-6 items-center border border-white/20">
            <span><i class="fas fa-shopping-bag mr-2"></i> Ver pedido</span>
            <span id="floatTotal" class="bg-black/30 px-4 py-1 rounded-full text-sm">$0</span>
        </button>
    </div>

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'}); logActivity('Click Logo')">
                <div class="w-9 h-9 bg-emerald-600 rounded-full flex items-center justify-center text-white font-bold text-lg shadow-md">D</div>
                <div>
                    <span class="text-xl font-black tracking-tight text-white">Don Cepillo</span>
                    <span class="text-yellow-300 text-[8px] font-bold uppercase block leading-none">Fábrica de trapeadores</span>
                </div>
            </div>
            <button onclick="openCartModal(); logActivity('Abrir Carrito')" class="relative text-white">
                <i class="fas fa-shopping-bag text-xl"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-blue-600 text-[9px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-bg min-h-[85vh] flex items-center justify-center text-center px-4 relative">
        <div class="absolute inset-0 bg-gradient-to-t from-[#1f1a15] via-transparent to-transparent"></div>
        <div class="max-w-3xl relative z-10">
            <span class="text-emerald-300 text-xs tracking-[0.3em] block mb-3 font-semibold">PRODUCTOS DE LIMPIEZA · PRECIOS DE MAYOREO</span>
            <h1 class="text-5xl md:text-7xl font-black text-white drop-shadow-2xl leading-tight">Todo para tu <span class="text-emerald-400">limpieza</span> y <span class="text-amber-400">hogar</span></h1>
            <p class="text-gray-200 mt-6 max-w-xl mx-auto">Trapeadores, escobas, fibras, esponjas y más. Levanta tu pedido por pieza, paquete o docena.</p>
            <button onclick="openMenuModal(); logActivity('Abrir Catálogo')" class="mt-8 bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-4 rounded-full font-bold uppercase tracking-wide transition shadow-xl text-sm">Ver catálogo y cotizar</button>
        </div>
    </section>

    <!-- MODAL MENÚ PRINCIPAL -->
    <div id="menuModal" class="modal-overlay p-4">
        <div id="menuContainer" class="bg-white w-full max-w-6xl max-h-[90vh] overflow-y-auto rounded-3xl shadow-2xl relative custom-scroll">
            <div class="sticky top-0 bg-white/95 backdrop-blur-sm px-6 py-4 border-b border-gray-200 flex justify-between items-center z-20">
                <div class="flex items-center gap-2">
                    <i class="fas fa-soap text-emerald-600 text-xl"></i>
                    <h2 class="text-2xl font-bold text-gray-800">Nuestro catálogo</h2>
                </div>
                <button onclick="closeModal('menuModal')" class="text-gray-400 hover:text-blue-600 text-2xl"><i class="fas fa-times-circle"></i></button>
            </div>
            <div class="p-6">
                <!-- Filtros -->
                <div id="filterBar" class="sticky top-16 z-30 bg-white/90 backdrop-blur-sm py-3 flex flex-wrap gap-2 border-b border-gray-100 mb-6">
                    <button onclick="filterCategory('all', this); logActivity('Filtrar: Todo')" class="filter-btn active bg-red-600 text-white text-[10px] font-bold px-5 py-2 rounded-full">🧽 Todo</button>
                    <button onclick="filterCategory('trapeadores', this); logActivity('Filtrar: Trapeadores')" class="filter-btn text-gray-600 text-[10px] font-bold px-5 py-2 rounded-full">🪣 Trapeadores</button>
                    <button onclick="filterCategory('escobas', this); logActivity('Filtrar: Escobas')" class="filter-btn text-gray-600 text-[10px] font-bold px-5 py-2 rounded-full">🧹 Escobas</button>
                    <button onclick="filterCategory('limpieza', this); logActivity('Filtrar: Limpieza')" class="filter-btn text-gray-600 text-[10px] font-bold px-5 py-2 rounded-full">🧴 Limpieza</button>
                    <button onclick="filterCategory('varios', this); logActivity('Filtrar: Varios')" class="filter-btn text-gray-600 text-[10px] font-bold px-5 py-2 rounded-full">📦 Varios</button>
                </div>

                <div id="menuContent" class="space-y-10"></div>
                
                <div class="text-center mt-8">
                    <button onclick="openCartModal(); logActivity('Ver Pedido desde Catálogo')" class="bg-emerald-600 text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-emerald-700 transition"><i class="fas fa-shopping-cart mr-2"></i> Ver mi pedido</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PRODUCTO (NOTAS) -->
    <div id="productModal" class="modal-overlay p-4">
        <div class="bg-white rounded-3xl max-w-md w-full shadow-2xl overflow-hidden">
            <div class="h-32 bg-emerald-50 flex items-center justify-center"><i class="fas fa-pump-soap text-5xl text-emerald-300"></i></div>
            <div class="p-6">
                <button onclick="closeModal('productModal')" class="float-right text-gray-400 hover:text-blue-600"><i class="fas fa-times text-xl"></i></button>
                <h3 id="modalProductName" class="text-2xl font-bold text-gray-800 mb-1">Producto</h3>
                <p id="modalProductPrice" class="text-blue-700 font-bold text-xl mb-4">$0</p>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Notas especiales</label>
                <textarea id="productNotes" rows="2" class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-red-500/50 outline-none" placeholder="Ej. color surtido, marca sugerida, tipo de uso..."></textarea>
                <div class="flex justify-between items-center mt-5">
                    <div class="flex items-center gap-3 bg-gray-100 rounded-full px-4 py-1">
                        <button onclick="updateModalQty(-1)" class="w-8 h-8 text-xl font-bold">-</button>
                        <span id="modalQty" class="font-bold w-8 text-center">1</span>
                        <button onclick="updateModalQty(1)" class="w-8 h-8 text-xl font-bold">+</button>
                    </div>
                    <button id="addToCartConfirmBtn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Agregar · <span id="modalTotal">$0</span></button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CARRITO -->
    <div id="cartModal" class="modal-overlay p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-6 relative border-t-4 border-blue-500">
            <button onclick="closeModal('cartModal')" class="absolute top-5 right-5 text-gray-400 hover:text-blue-600"><i class="fas fa-times text-xl"></i></button>
            <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fas fa-shopping-bag text-blue-700"></i> Mi pedido</h2>
            <p class="text-gray-500 text-xs border-b pb-3 mt-2"><span id="cartCountText">0</span> productos</p>
            <div id="cartItemsList" class="space-y-3 my-5 max-h-80 overflow-y-auto pr-1 custom-scroll"></div>
            <div class="flex justify-between items-center border-t pt-4 font-bold text-xl">
                <span>Total</span>
                <span id="cartTotalPrice" class="text-blue-700">$0</span>
            </div>
            <div class="mt-6 space-y-3">
                <input type="text" id="orderName" placeholder="Tu nombre *" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-red-500">
                <input type="text" id="orderPlace" placeholder="Dirección de entrega o punto de referencia *" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-red-500">
                <textarea id="orderNotes" rows="2" placeholder="Instrucciones (ej. horario de entrega, referencia...)" class="w-full p-3 bg-gray-100 rounded-xl outline-none text-sm"></textarea>
                <div id="orderBtnContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURACIÓN NEGOCIO =================
        const CONFIG = {
            name: "Don Cepillo",
            whatsapp: "528128703965",
            openHour: 8,
            closeHour: 20,
            deliveryTime: "Entrega a coordinar por WhatsApp",
            deliveryZone: "Níspero #1125, Col. Laderas de San Miguel, 3er Sector, Escobedo N.L.",
            storageKey: 'doncepillo_cart',
            currency: 'MXN'
        };

        // ================= BACKEND APPS SCRIPT =================
        // ⚠️ IMPORTANTE: Reemplaza esta URL con la de tu Google Apps Script
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwGTyAEuvyHPozkLOLDL_HjgbjUdvPzTdn5tPk7n0VTPxBMckW1YBKQ9ugIau0HBl4mXQ/exec";

        // Función para registrar métricas (Clicks, visitas, etc.)
        async function logActivity(event, extraData = {}) {
            try {
                await fetch(BACKEND_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "trackClick",
                        timestamp: new Date().toISOString(),
                        payload: {
                            event: event,
                            userAgent: navigator.userAgent,
                            referrer: document.referrer || "Directo",
                            url: window.location.href,
                            ...extraData
                        }
                    })
                });
                console.log(`[Analytics] ${event} registrado`);
            } catch (e) { 
                console.error("Error tracking:", e); 
            }
        }

        // Función para guardar pedido en Google Sheets
        async function saveOrderToSheets(orderData) {
            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "saveOrder",
                        timestamp: new Date().toISOString(),
                        payload: orderData
                    })
                });
                console.log("Pedido guardado en Google Sheets");
                return true;
            } catch (e) {
                console.error("Error guardando pedido:", e);
                return false;
            }
        }

        // ================= MENÚ COMPLETO =================
        const menuData = [
            // Trapeadores
            { id: 1, sec: "trapeadores", name: "Trapeador hilaza", priceChico: 46, priceGrande: 552, desc: "Pieza $46 · Docena $552", tag: "🧵 Hilo suave" },
            { id: 2, sec: "trapeadores", name: "Trapeador trenzado", priceChico: 50, priceGrande: 600, desc: "Pieza $50 · Docena $600", tag: "🧶 Trenzado" },
            { id: 3, sec: "trapeadores", name: "Trapeador fibra española", priceChico: 80, priceGrande: 960, desc: "Pieza $80 · Docena $960", tag: "🇪🇸 Reforzado" },
            { id: 4, sec: "trapeadores", name: "Trapeador Magiti", priceChico: 30, priceGrande: 360, desc: "Pieza $30 · Docena $360", tag: "💧 Uso diario" },
            { id: 5, sec: "trapeadores", name: "Trapeador pábilo algodón", priceChico: 40, priceGrande: 480, desc: "Pieza $40 · Docena $480", tag: "🧼 Algodón" },
            { id: 6, sec: "trapeadores", name: "Trapeador payaso", priceChico: 60, priceGrande: 720, desc: "Pieza $60 · Docena $720", tag: "🌈 Colores" },

            // Escobas y cepillos
            { id: 7, sec: "escobas", name: "Escoba abanico", priceChico: 39, priceGrande: 468, desc: "Pieza $39 · Docena $468", tag: "🧹 Con bastón" },
            { id: 8, sec: "escobas", name: "Cepillo recto", priceChico: 35, priceGrande: 420, desc: "Pieza $35 · Docena $420", tag: "🪥 Con bastón" },
            { id: 9, sec: "escobas", name: "Escoba super Lukas", priceChico: 48, priceGrande: 576, desc: "Pieza $48 · Docena $576", tag: "⭐ Mayoreo" },
            { id: 10, sec: "escobas", name: "Escoba Mega", priceChico: 48, priceGrande: 576, desc: "Pieza $48 · Docena $576", tag: "🏪 Mayoreo" },
            { id: 11, sec: "escobas", name: "Jalador de agua 50 cm", priceChico: 48, priceGrande: null, desc: "Pieza $48", tag: "🚿 50 cm" },
            { id: 12, sec: "escobas", name: "Recogedor", priceChico: 22, priceGrande: 264, desc: "Pieza $22 · Docena $264", tag: "🗑️ Práctico" },

            // Limpieza y baño
            { id: 13, sec: "limpieza", name: "Borla puff", priceChico: 60, priceGrande: null, desc: "Paquete de 5 por $60", tag: "🛁 Baño" },
            { id: 14, sec: "limpieza", name: "Tallador multiusos", priceChico: 75, priceGrande: null, desc: "Paquete de 10 por $75", tag: "🧽 Cocina" },
            { id: 15, sec: "limpieza", name: "Guantes multiusos", priceChico: 25, priceGrande: null, desc: "Pieza $25", tag: "🧤 Protección" },
            { id: 16, sec: "limpieza", name: "Atomizador con botella", priceChico: 80, priceGrande: null, desc: "Paquete de 4 por $80", tag: "🧴 Spray" },
            { id: 17, sec: "limpieza", name: "Pistola uso rudo", priceChico: 150, priceGrande: null, desc: "Paquete de 10 por $150", tag: "💦 Repuesto" },
            { id: 18, sec: "limpieza", name: "Fibra metálica", priceChico: 80, priceGrande: null, desc: "Paquete de 10 por $80", tag: "🔩 Acero" },
            { id: 19, sec: "limpieza", name: "Esponja carita", priceChico: 150, priceGrande: null, desc: "Paquete de 20 por $150", tag: "🙂 Cocina" },
            { id: 20, sec: "limpieza", name: "Microfibra toalla", priceChico: 125, priceGrande: null, desc: "Paquete de 10 por $125", tag: "✨ Microfibra" },

            // Varios
            { id: 21, sec: "varios", name: "Pinzas", priceChico: 28, priceGrande: 336, desc: "Pieza $28 · Docena $336", tag: "👕 Ropa" },
            { id: 22, sec: "varios", name: "Lazo", priceChico: 25, priceGrande: 300, desc: "Pieza $25 · Docena $300", tag: "🧶 Tendido" },
            { id: 23, sec: "varios", name: "Bomba de baño", priceChico: 30, priceGrande: 360, desc: "Pieza $30 · Docena $360", tag: "🚽 Destapa" },
            { id: 24, sec: "varios", name: "Cepillo plancha", priceChico: 18, priceGrande: 216, desc: "Pieza $18 · Docena $216", tag: "🪥 Lavado" },
            { id: 25, sec: "varios", name: "Pilas AA (caja c/24)", priceChico: 50, priceGrande: null, desc: "Caja con 24 por $50", tag: "🔋 Electrónica" },
            { id: 26, sec: "varios", name: "Pilas AAA (caja c/24)", priceChico: 50, priceGrande: null, desc: "Caja con 24 por $50", tag: "🔋 Electrónica" },
            { id: 27, sec: "varios", name: "Encendedor Eco", priceChico: 165, priceGrande: null, desc: "Caja con 50 por $165", tag: "🔥 Hogar" },
            { id: 28, sec: "varios", name: "Marcador negro", priceChico: 55, priceGrande: null, desc: "Caja con 10 por $55", tag: "🖊️ Oficina" }
        ];

        let cartItems = JSON.parse(localStorage.getItem(CONFIG.storageKey)) || [];
        let currentProduct = null;
        let currentModalQty = 1;
        let currentSize = 'chico';
        let activeCategory = 'all';

        const formatter = new Intl.NumberFormat('es-MX', { style: 'currency', currency: CONFIG.currency, minimumFractionDigits: 0 });
        const categoryImages = {
            trapeadores: "https://images.unsplash.com/photo-1604335399105-a0c585fd81a1?auto=format&fit=crop&q=80&w=1200",
            escobas: "https://images.unsplash.com/photo-1563453392212-326f5e854473?auto=format&fit=crop&q=80&w=1200",
            limpieza: "https://images.unsplash.com/photo-1583947215259-38e31be8751f?auto=format&fit=crop&q=80&w=1200",
            varios: "https://images.unsplash.com/photo-1616627981459-8f0c8f5f16c5?auto=format&fit=crop&q=80&w=1200"
        };
        const fallbackImage = "https://via.placeholder.com/600x400/1d4ed8/facc15?text=Don+Cepillo";

        function getProductImage(product) {
            return product.image || categoryImages[product.sec] || fallbackImage;
        }

        function getProductPrice(product, size) {
            if (size === 'grande' && product.priceGrande) return product.priceGrande;
            return product.priceChico;
        }

        function getBusinessStatus() {
            const now = new Date();
            const hour = now.getHours();
            return (hour >= CONFIG.openHour && hour < CONFIG.closeHour);
        }

        function updateUIStatus() {
            const isOpen = getBusinessStatus();
            const btnContainer = document.getElementById('orderBtnContainer');
            if (btnContainer) {
                btnContainer.innerHTML = isOpen
                    ? `<button onclick="sendToWhatsApp()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2"><i class="fab fa-whatsapp"></i> Confirmar pedido por WhatsApp</button>`
                    : `<div class="w-full bg-gray-200 text-gray-500 py-3 rounded-xl text-center font-bold">🔒 Cerrado · Abrimos a las ${CONFIG.openHour}:00 hrs</div>`;
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function saveCart() { 
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(cartItems)); 
            updateCartUI(); 
        }

        function updateCartUI() {
            const list = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotalPrice');
            const badge = document.getElementById('cartCount');
            const modalBadge = document.getElementById('modalCartCount');
            const countText = document.getElementById('cartCountText');
            const floatTotal = document.getElementById('floatTotal');
            const floating = document.getElementById('floatingCart');
            let totalItems = 0, totalMoney = 0;

            if (!list) return;

            if (cartItems.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 py-4">🛒 Carrito vacío</div>';
                floating?.classList.remove('active');
            } else {
                list.innerHTML = cartItems.map((item, idx) => {
                    const product = menuData.find(p => p.id === item.id);
                    if (!product) return '';
                    const price = getProductPrice(product, item.size);
                    const subtotal = price * item.qty;
                    totalItems += item.qty;
                    totalMoney += subtotal;
                    return `<div class="bg-gray-50 p-3 rounded-xl border">
                                <div class="flex justify-between"><span class="font-bold">${product.name} (${item.size === 'grande' ? 'Docena' : 'Pieza'})</span><span class="text-red-600 font-bold">${formatter.format(subtotal)}</span></div>
                                ${item.notes ? `<p class="text-xs text-amber-600 mt-1">📝 "${item.notes}"</p>` : ''}
                                <div class="flex justify-between items-center mt-2">
                                    <div class="flex items-center gap-2 bg-white rounded-full border px-2 py-1">
                                        <button onclick="updateQtyByIndex(${idx}, -1)" class="px-2">-</button>
                                        <span>${item.qty}</span>
                                        <button onclick="updateQtyByIndex(${idx}, 1)" class="px-2">+</button>
                                    </div>
                                    <button onclick="removeItem(${idx})" class="text-xs text-blue-600">Eliminar</button>
                                </div>
                            </div>`;
                }).join('');
                floating?.classList.add('active');
            }

            badge.innerText = totalItems;
            badge.classList.toggle('hidden', totalItems === 0);
            if (modalBadge) modalBadge.innerText = totalItems;
            if (countText) countText.innerText = totalItems;
            totalSpan.innerText = formatter.format(totalMoney);
            if (floatTotal) floatTotal.innerText = formatter.format(totalMoney);
        }

        function updateQtyByIndex(index, delta) {
            let item = cartItems[index];
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cartItems.splice(index, 1);
            saveCart();
            logActivity('Actualizar cantidad', { productId: item.id, newQty: item.qty });
        }
        
        function removeItem(index) { 
            const removed = cartItems[index];
            cartItems.splice(index, 1); 
            saveCart();
            logActivity('Eliminar producto', { productId: removed?.id });
        }

        // FILTROS Y RENDER
        function filterCategory(cat, btn) {
            activeCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active', 'bg-blue-600', 'text-white'));
            btn.classList.add('active', 'bg-blue-600', 'text-white');
            renderMenu();
        }

        function renderMenu() {
            const sectionsMap = { trapeadores: "🪣 Trapeadores", escobas: "🧹 Escobas y cepillos", limpieza: "🧼 Limpieza y baño", varios: "📦 Varios" };
            let keys = activeCategory === 'all' ? Object.keys(sectionsMap) : [activeCategory];
            const container = document.getElementById('menuContent');
            if (!container) return;
            container.innerHTML = keys.map(key => `
                <div>
                    <h3 class="text-xl font-bold text-gray-800 border-l-4 border-yellow-400 pl-3 mb-4">${sectionsMap[key]}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${menuData.filter(p => p.sec === key).map(product => {
                            const hasGrande = product.priceGrande !== null;
                            return `<div class="menu-item-card rounded-2xl p-4 flex gap-3 items-start" onclick="openProductModal(${product.id})">
                                        <img src="${getProductImage(product)}" onerror="this.src='${fallbackImage}'" alt="${product.name}" class="w-20 h-20 rounded-xl object-cover border border-blue-100">
                                        <div class="flex-1">
                                            <div class="flex items-center gap-2"><span class="font-bold text-gray-800">${product.name}</span>${product.tag ? `<span class="text-[8px] bg-yellow-100 text-blue-700 px-2 py-0.5 rounded-full">${product.tag}</span>` : ''}</div>
                                            <p class="text-gray-500 text-xs mt-0.5">${product.desc}</p>
                                            <div class="flex gap-3 mt-2 text-sm font-bold">
                                                <span class="text-red-600">Pieza ${formatter.format(product.priceChico)}</span>
                                                ${hasGrande ? `<span class="text-gray-600">Docena ${formatter.format(product.priceGrande)}</span>` : ''}
                                            </div>
                                        </div>
                                        <button class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md hover:bg-blue-700"><i class="fas fa-plus text-sm"></i></button>
                                    </div>`;
                        }).join('')}
                    </div>
                </div>`).join('');
        }

        // MODAL PRODUCTO
        function openProductModal(id) {
            currentProduct = menuData.find(p => p.id === id);
            if (!currentProduct) return;
            currentModalQty = 1;
            currentSize = currentProduct.priceGrande ? 'chico' : 'chico';
            document.getElementById('modalProductName').innerText = currentProduct.name;
            document.getElementById('modalProductPrice').innerHTML = `<span class="flex gap-3 items-center"><span class="cursor-pointer ${currentSize === 'chico' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700'} px-3 py-1 rounded-full text-xs font-bold" onclick="event.stopPropagation(); setSizeAndUpdate('chico')">Pieza ${formatter.format(currentProduct.priceChico)}</span>${currentProduct.priceGrande ? `<span class="cursor-pointer ${currentSize === 'grande' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700'} px-3 py-1 rounded-full text-xs font-bold" onclick="event.stopPropagation(); setSizeAndUpdate('grande')">Docena ${formatter.format(currentProduct.priceGrande)}</span>` : ''}</span>`;
            document.getElementById('productNotes').value = '';
            updateModalQty(0);
            document.getElementById('productModal').classList.add('active');
            document.getElementById('addToCartConfirmBtn').onclick = () => {
                let notes = document.getElementById('productNotes').value.trim();
                let price = getProductPrice(currentProduct, currentSize);
                cartItems.push({ id: currentProduct.id, qty: currentModalQty, size: currentSize, notes: notes });
                saveCart();
                logActivity('Agregar al carrito', { 
                    productId: currentProduct.id, 
                    productName: currentProduct.name,
                    qty: currentModalQty,
                    size: currentSize
                });
                showToast(`+ ${currentModalQty}x ${currentProduct.name} (${currentSize === 'grande' ? 'Docena' : 'Pieza'})`);
                closeModal('productModal');
            };
        }
        
        function setSizeAndUpdate(size) { 
            currentSize = size; 
            if (currentProduct) { 
                document.getElementById('modalProductPrice').innerHTML = `<span class="flex gap-3 items-center"><span class="cursor-pointer ${size === 'chico' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700'} px-3 py-1 rounded-full text-xs font-bold" onclick="event.stopPropagation(); setSizeAndUpdate('chico')">Pieza ${formatter.format(currentProduct.priceChico)}</span>${currentProduct.priceGrande ? `<span class="cursor-pointer ${size === 'grande' ? 'bg-red-600 text-white' : 'bg-gray-200 text-gray-700'} px-3 py-1 rounded-full text-xs font-bold" onclick="event.stopPropagation(); setSizeAndUpdate('grande')">Docena ${formatter.format(currentProduct.priceGrande)}</span>` : ''}</span>`; 
                updateModalQty(0); 
            } 
        }
        
        function updateModalQty(delta) { 
            currentModalQty = Math.max(1, currentModalQty + delta); 
            document.getElementById('modalQty').innerText = currentModalQty; 
            if (currentProduct) document.getElementById('modalTotal').innerText = formatter.format(getProductPrice(currentProduct, currentSize) * currentModalQty); 
        }

        // WHATSAPP CON INTEGRACIÓN A GOOGLE SHEETS
        async function sendToWhatsApp() {
            if (!getBusinessStatus()) {
                alert(`🕒 Horario: ${CONFIG.openHour}:00 a ${CONFIG.closeHour}:00`);
                return;
            }
            
            let name = document.getElementById('orderName')?.value.trim();
            let addr = document.getElementById('orderPlace')?.value.trim();
            let notes = document.getElementById('orderNotes')?.value.trim();
            
            if (!name || !addr) { 
                alert("❌ Por favor ingresa tu nombre y la dirección o referencia de entrega.");
                return; 
            }
            
            if (cartItems.length === 0) { 
                alert("❌ Tu pedido está vacío.");
                return; 
            }

            // Preparar resumen del pedido
            const orderItems = cartItems.map(item => {
                let p = menuData.find(m => m.id === item.id);
                return {
                    name: p.name,
                    qty: item.qty,
                    size: item.size === 'grande' ? 'Docena' : 'Pieza',
                    notes: item.notes || '',
                    price: getProductPrice(p, item.size),
                    subtotal: getProductPrice(p, item.size) * item.qty
                };
            });

            const total = orderItems.reduce((acc, item) => acc + item.subtotal, 0);
            const orderItemsSummary = orderItems.map(item => `${item.qty}x ${item.name} (${item.size})`).join(", ");

            // Guardar en Google Sheets (sin bloquear la experiencia del usuario)
            const orderData = {
                name: name,
                address: addr,
                items: orderItemsSummary,
                itemsDetailed: JSON.stringify(orderItems),
                total: total,
                notes: notes,
                status: "Pendiente",
                source: "Web"
            };
            
            // Enviar a Sheets en segundo plano
            saveOrderToSheets(orderData);
            
            // Registrar evento de pedido
            logActivity("Pedido enviado a WhatsApp", { 
                orderValue: total,
                itemCount: cartItems.length
            });

            // Construir mensaje de WhatsApp
            let msg = `*🧽 ${CONFIG.name} - NUEVO PEDIDO*%0A`;
            msg += `*Cliente:* ${name}%0A`;
            msg += `*Dirección:* ${addr}%0A`;
            msg += `*Zona:* ${CONFIG.deliveryZone}%0A%0A`;
            msg += `*Pedido:*%0A`;
            
            cartItems.forEach(item => {
                let p = menuData.find(m => m.id === item.id);
                let price = getProductPrice(p, item.size);
                let sub = price * item.qty;
                msg += `▫️ ${item.qty}x ${p.name} (${item.size === 'grande' ? 'Docena' : 'Pieza'})`;
                if (item.notes) msg += ` [📝 ${item.notes}]`;
                msg += ` = *${formatter.format(sub)}*%0A`;
            });
            
            msg += `%0a*TOTAL: ${formatter.format(total)}*%0a`;
            if (notes) msg += `%0a*Instrucciones:* ${notes}%0a`;
            msg += `%0a⏱️ Tiempo estimado: ${CONFIG.deliveryTime}`;
            
            // Abrir WhatsApp
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${msg}`, '_blank');
            
            // Limpiar carrito
            cartItems = [];
            saveCart();
            closeModal('cartModal');
            showToast("✅ Pedido enviado para cotización por WhatsApp");
        }

        function openMenuModal() { 
            document.getElementById('menuModal').classList.add('active'); 
            document.body.style.overflow = 'hidden'; 
            renderMenu();
            logActivity("Abrir menú");
        }
        
        function openCartModal() { 
            document.getElementById('cartModal').classList.add('active'); 
            document.body.style.overflow = 'hidden'; 
            updateCartUI(); 
            updateUIStatus();
            logActivity("Abrir carrito");
        }
        
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
        }

        // Registrar el click inicial al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            updateCartUI();
            updateUIStatus();
            setInterval(updateUIStatus, 60000);
            
            // Registrar visita inicial
            logActivity("Visita Web", {
                pageLoadTime: new Date().toISOString(),
                cartItemsCount: cartItems.length
            });
            
            // Registrar si hay carrito abandonado
            if (cartItems.length > 0) {
                logActivity("Carrito persistente", { itemCount: cartItems.length });
            }
            
            document.addEventListener('keydown', e => { 
                if (e.key === 'Escape') { 
                    closeModal('menuModal'); 
                    closeModal('cartModal'); 
                    closeModal('productModal'); 
                } 
            });
        });
    </script>
</body>
</html>
