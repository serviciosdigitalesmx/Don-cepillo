  <circle cx="450" cy="380" r="300" fill="url(#bg)" stroke="#7db9ef" stroke-width="18"/>
  <path d="M175 610 h550 l-30 40 h-490z" fill="#f7e06a" stroke="#1d2f84" stroke-width="10" />
